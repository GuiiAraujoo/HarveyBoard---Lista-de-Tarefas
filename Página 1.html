<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarveyBoard - Página 1</title>
  <link rel="stylesheet" href="Página 1.css" />
</head>
<body>
  <!-- Cabeçalho com título centralizado -->
  <header>HarveyBoard</header>

  <div class="container">
    <img src="harvey.png" alt="Harvey" class="harvey" />
    <div class="dialog-box">
      <p id="greeting">Olá!</p>
      <label for="username">Espero que esteja bem! Qual o seu nome?</label>
      <input type="text" id="username" placeholder="Digite seu nome..." />
      <button id="continueBtn">Continuar</button>
    </div>
  </div>

  <script src="Página 1.js"></script>
</body>
</html>
